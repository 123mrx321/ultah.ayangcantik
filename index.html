<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 💖</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 100px;
            color: white;
        }
        h1 {
            font-size: 50px;
        }
        p {
            font-size: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: white;
            color: #ff4d6d;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ffe6eb;
        }
    </style>
</head>
<body>

    <h1>Happy Birthday Sayang 🎉</h1>
    <p>Terima kasih sudah hadir di hidupku 💖</p>

    <button onclick="showMessage()">Klik Aku</button>

    <script>
        function showMessage() {
            alert("Aku selalu bersyukur punya kamu ❤️");
        }
    </script>

</body>
</html>
